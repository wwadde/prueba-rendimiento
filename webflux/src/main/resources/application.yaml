spring:
  application:
    name: webflux
  r2dbc:
#    local
#    url: r2dbc:postgresql://localhost:15432/pruebarendimiento
#    docker
    url: r2dbc:postgresql://postgres:5432/pruebarendimiento
    username: postgres
    password: admin



server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
